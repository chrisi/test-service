name: Continuous CI/CD

on:
  push:
    branches: [ "develop", "feature/*" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Setup Maven
        uses: s4u/setup-maven-action@v1.18.0
        with:
          java-version: '25'
          java-distribution: 'temurin'

      - name: Setup Maven settings.xml
        run: |
          mkdir -p ~/.m2
          echo "${{ secrets.MAVEN_SETTINGS }}" | base64 -d > ~/.m2/settings.xml

      - name: Build with Maven
        run: mvn clean package -U -B -DskipTests --file pom.xml

      - name: Deploy with Maven
        run: mvn deploy -U -B -DskipTests --file pom.xml

      - name: Build Docker Image
        run: |
          mvn spring-boot:build-image -B -DskipTests \
            -Dspring-boot.build-image.imageName=dockerhub.gtidev.net/airplus/test-service

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: dockerhub.gtidev.net
          username: ${{ secrets.NEXUS_USERNAME }}
          password: ${{ secrets.NEXUS_PASSWORD }}

      - name: Push Docker Image
        run: |
          docker push dockerhub.gtidev.net/airplus/test-service:latest
