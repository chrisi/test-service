---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: observability
data:
  tempo.yaml: |2-
    stream_over_http_enabled: true
    
    server:
      http_listen_port: 3200
    
    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
      # The distributor needs to know where to send incoming spans
      ring:
        kvstore:
          store: inmemory
    
    ingester:
      lifecycler:
        address: 127.0.0.1
        ring:
          kvstore:
            store: inmemory
          replication_factor: 1
      max_block_duration: 5m
    
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal
    
    # This section tells the Querier how to discover the Ingester 
    # to avoid the "empty ring" error.
    querier:
      frontend_worker:
        frontend_address: 127.0.0.1:9095
    
    # This is required in 2.10.x single-binary to bridge the internal components
    overrides:
      defaults:
        ingestion:
          max_traces_per_user: 10000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tempo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tempo
        app.kubernetes.io/component: traces
    spec:
      containers:
        - name: tempo
          image: grafana/tempo:2.10.3
          args:
            - -config.file=/etc/tempo/tempo.yaml
#          resources:
#            limits:
#              memory: 1Gi
#              cpu: "1"
#            requests:
#              memory: 256Mi
#              cpu: 100m
          ports:
            - containerPort: 3200
            - containerPort: 4317
            - containerPort: 4318
          volumeMounts:
            - name: config
              mountPath: /etc/tempo
            - name: data
              mountPath: /var/tempo
      volumes:
        - name: config
          configMap:
            name: tempo-config
        - name: data
          # For k3s, consider using a PersistentVolumeClaim here
          # instead of emptyDir so your traces survive pod deletes.
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: observability
spec:
  selector:
    app.kubernetes.io/name: tempo
  ports:
    - name: http
      port: 3200
      targetPort: 3200
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
